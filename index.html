<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>인플루디오 맛집 지도</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Gmarket+Sans:wght@500;700&display=swap" rel="stylesheet"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Gmarket+Sans:wght@500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0f0f13; --surface:#1a1a22; --surface2:#22222e; --surface3:#2a2a38;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --text:#f0f0f5; --text2:#9898b0; --text3:#5a5a72;
  --accent:#ff6b35; --yellow:#fbbf24;
  --radius:12px; --radius-sm:8px; --sidebar:360px;
  --font-sans: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  --font-display: 'Gmarket Sans', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
}
html, body {
  height:100%;
  font-family: var(--font-sans);
  background:var(--bg); color:var(--text); overflow:hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
#app { display:flex; height:100vh; }

/* ── SIDEBAR ── */
#sidebar { width:var(--sidebar); min-width:var(--sidebar); background:var(--surface); display:flex; flex-direction:column; border-right:1px solid var(--border); z-index:10; }
#sidebar-top { padding:20px 20px 14px; border-bottom:1px solid var(--border); }
.logo { font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--accent); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.logo-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; flex-shrink:0; }
.search-wrap { position:relative; margin-bottom:12px; }
.search-wrap input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px 36px 9px 12px; font-size:13px; color:var(--text); font-family:var(--font-sans); outline:none; transition:border-color .2s; }
.search-wrap input:focus { border-color:var(--accent); }
.search-wrap input::placeholder { color:var(--text3); }
.search-icon { position:absolute; right:11px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:14px; pointer-events:none; }

.sort-row { display:flex; gap:6px; margin-bottom:10px; }
.sort-btn { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:500; border:1px solid var(--border); background:var(--surface2); color:var(--text3); cursor:pointer; transition:all .15s; white-space:nowrap; font-family:var(--font-sans); }
.sort-btn.active { background:var(--surface3); border-color:var(--border2); color:var(--text); }
.sort-btn:hover { color:var(--text2); }

.filter-chips { display:flex; gap:5px; flex-wrap:wrap; }
.chip { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:500; border:1px solid var(--border); background:var(--surface2); color:var(--text2); cursor:pointer; transition:all .15s; white-space:nowrap; font-family:var(--font-sans); }
.chip:hover { border-color:var(--border2); color:var(--text); }
.chip.active { color:#fff; }
.chip[data-cat="전체"].active  { background:#ff6b35; border-color:#ff6b35; }
.chip[data-cat="한식"].active  { background:#e85d3c; border-color:#e85d3c; }
.chip[data-cat="분식"].active  { background:#e87c3c; border-color:#e87c3c; }
.chip[data-cat="고깃집"].active{ background:#c0392b; border-color:#c0392b; }
.chip[data-cat="중식"].active  { background:#e8a03c; border-color:#e8a03c; }
.chip[data-cat="일식"].active  { background:#3c8ee8; border-color:#3c8ee8; }
.chip[data-cat="아시안"].active{ background:#2ecc71; border-color:#2ecc71; }
.chip[data-cat="양식"].active  { background:#7c5ce8; border-color:#7c5ce8; }
.chip[data-cat="멕시칸"].active{ background:#e84393; border-color:#e84393; }
.chip[data-cat="샐러드"].active{ background:#27ae60; border-color:#27ae60; }
.chip[data-cat="카페"].active  { background:#5cb85c; border-color:#5cb85c; }
.chip[data-cat="기타"].active  { background:#888; border-color:#888; }

#place-list { flex:1; overflow-y:auto; padding:8px 0; scrollbar-width:thin; scrollbar-color:var(--surface3) transparent; }
#place-list::-webkit-scrollbar { width:4px; }
#place-list::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:2px; }
.place-item { padding:12px 20px; cursor:pointer; border-bottom:1px solid var(--border); transition:background .12s; }
.place-item:hover { background:var(--surface2); }
.place-item.active { background:var(--surface2); border-left:3px solid var(--accent); padding-left:17px; }
.place-item-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
.place-item-name { font-size:14px; font-weight:700; color:var(--text); flex:1; }
.cat-badge { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:500; margin-left:6px; white-space:nowrap; }
.cat-한식  { background:rgba(232,93,60,.18);  color:#ff7555; }
.cat-분식  { background:rgba(232,124,60,.18); color:#ff9044; }
.cat-고깃집{ background:rgba(192,57,43,.18);  color:#e74c3c; }
.cat-중식  { background:rgba(232,160,60,.18); color:#ffb644; }
.cat-일식  { background:rgba(60,142,232,.18); color:#5baeff; }
.cat-아시안{ background:rgba(46,204,113,.18); color:#2ecc71; }
.cat-양식  { background:rgba(124,92,232,.18); color:#a07aff; }
.cat-멕시칸{ background:rgba(232,67,147,.18); color:#f06cb8; }
.cat-샐러드{ background:rgba(39,174,96,.18);  color:#4ecf7f; }
.cat-카페  { background:rgba(92,184,92,.18);  color:#6cd46c; }
.cat-기타  { background:rgba(136,136,136,.18);color:#aaa; }

.place-item-meta { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); flex-wrap:wrap; }
.stars-mini { color:var(--yellow); font-size:11px; letter-spacing:-1px; }
.star-count { font-size:11px; color:var(--text3); }
.nick-tag { color:var(--text3); font-size:11px; }
.comment-count { font-size:11px; color:var(--text3); margin-left:auto; }
.place-item-review { font-size:12px; color:var(--text2); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:5px; }
.item-tag  { font-size:10px; padding:2px 7px; border-radius:10px; border:1px solid var(--border2); color:var(--text3); background:var(--surface3); }
.item-tag.discount { color:#fbbf24; border-color:rgba(251,191,36,.3); background:rgba(251,191,36,.08); }
.item-tag.parking  { color:#60a5fa; border-color:rgba(96,165,250,.3); background:rgba(96,165,250,.08); }
.item-tag.delivery { color:#a78bfa; border-color:rgba(167,139,250,.3); background:rgba(167,139,250,.08); }
.item-tag.group    { color:#34d399; border-color:rgba(52,211,153,.3); background:rgba(52,211,153,.08); }
.item-tag.solo     { color:#fb7185; border-color:rgba(251,113,133,.3); background:rgba(251,113,133,.08); }
.item-tag.outdoor  { color:#6ee7b7; border-color:rgba(110,231,183,.3); background:rgba(110,231,183,.08); }
.item-tag.quick    { color:#f97316; border-color:rgba(249,115,22,.3); background:rgba(249,115,22,.08); }

#no-result { padding:40px 20px; text-align:center; color:var(--text3); font-size:13px; }
.list-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; gap:12px; }
.spinner { width:24px; height:24px; border:2px solid var(--surface3); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.list-loading p { font-size:13px; color:var(--text3); }

#add-btn { margin:12px 20px; padding:12px; background:var(--accent); border:none; border-radius:var(--radius-sm); color:#fff; font-size:14px; font-weight:700; font-family:var(--font-display); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition:opacity .15s, transform .1s; }
#add-btn:hover { opacity:.88; }
#add-btn:active { transform:scale(.98); }

/* ── MAP ── */
#map-wrap { flex:1; position:relative; }
#map { width:100%; height:100%; background:#1a1f2e; }
.leaflet-tile { filter:invert(.9) hue-rotate(175deg) saturate(.7) brightness(.95); }
.leaflet-container { background:#1a1f2e; }
.leaflet-control-attribution { font-size:10px; background:rgba(26,26,34,.8) !important; color:var(--text3) !important; }
.leaflet-control-attribution a { color:var(--text3) !important; }
.leaflet-control-zoom a { background:var(--surface) !important; color:var(--text) !important; border-color:var(--border2) !important; }

.map-pin-wrap { cursor:pointer; display:flex; flex-direction:column; align-items:flex-start; }
.map-pin-bubble { background:var(--surface); border:1.5px solid var(--border2); border-radius:8px; padding:5px 10px; font-size:12px; font-weight:700; font-family:var(--font-sans); color:var(--text); white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.45); display:flex; align-items:center; gap:5px; transition:transform .15s; }
.map-pin-bubble:hover { transform:translateY(-2px); }
.map-pin-bubble.sel { background:#2a1a14; }
.pin-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.pin-tail { width:10px; height:6px; margin-left:10px; clip-path:polygon(0 0, 100% 0, 50% 100%); background:var(--surface); }
.pin-tail.sel { background:#2a1a14; }

.hq-pin-wrap { display:flex; flex-direction:column; align-items:center; cursor:default; }
.hq-pin-bubble { background:var(--accent); color:#fff; font-size:12px; font-weight:700; padding:6px 12px; border-radius:20px; white-space:nowrap; font-family:var(--font-sans); box-shadow:0 3px 12px rgba(255,107,53,.45); }
.hq-pin-tail { width:10px; height:6px; clip-path:polygon(0 0, 100% 0, 50% 100%); background:var(--accent); margin-top:-1px; }

#map-info-bar { position:absolute; top:14px; left:14px; background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius-sm); padding:8px 14px; font-size:12px; color:var(--text2); z-index:500; display:flex; align-items:center; gap:8px; font-family:var(--font-sans); }
.map-count { font-weight:700; color:var(--accent); }
.sync-dot { width:7px; height:7px; border-radius:50%; background:#5cb85c; flex-shrink:0; }
.sync-dot.loading { background:var(--yellow); animation:pulse .8s ease-in-out infinite; }
.sync-dot.error { background:#e85d3c; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.my-nick-badge { position:absolute; bottom:14px; left:14px; background:var(--surface); border:1px solid var(--border2); border-radius:20px; padding:7px 14px; font-size:12px; color:var(--text2); z-index:500; cursor:pointer; transition:border-color .15s; font-family:var(--font-sans); }
.my-nick-badge:hover { border-color:var(--accent); color:var(--accent); }
.my-nick-badge strong { color:var(--text); }

/* ── 오늘 뭐 먹지 버튼 ── */
#roulette-btn {
  position:absolute; bottom:14px; right:16px; z-index:500;
  background:linear-gradient(135deg, #ff6b35, #ff9a35);
  border:none; border-radius:50px; padding:12px 20px;
  color:#fff; font-size:14px; font-weight:700;
  font-family:var(--font-display);
  cursor:pointer; display:flex; align-items:center; gap:8px;
  box-shadow:0 4px 20px rgba(255,107,53,.45);
  transition:all .2s;
}
#roulette-btn:hover { transform:translateY(-2px); box-shadow:0 6px 28px rgba(255,107,53,.6); }
#roulette-btn:active { transform:scale(.97); }
.roulette-icon { font-size:18px; animation:none; }
#roulette-btn:hover .roulette-icon { animation:spin-fast .4s ease; }
@keyframes spin-fast { to { transform:rotate(360deg); } }

/* ── DETAIL PANEL ── */
#detail-panel { position:absolute; right:16px; top:16px; width:300px; max-height:calc(100vh - 32px); overflow-y:auto; background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius); padding:20px; z-index:500; display:none; box-shadow:0 8px 32px rgba(0,0,0,.5); animation:slideIn .2s ease; scrollbar-width:thin; scrollbar-color:var(--surface3) transparent; }
#detail-panel.show { display:block; }
@keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.dp-close { position:absolute; right:14px; top:14px; width:26px; height:26px; border-radius:50%; background:var(--surface3); border:none; color:var(--text2); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:background .15s; }
.dp-close:hover { background:var(--surface); color:var(--text); }
.dp-cat-badge { display:inline-block; font-size:11px; padding:3px 9px; border-radius:10px; font-weight:500; margin-bottom:8px; }
.dp-name { font-family:var(--font-display); font-size:20px; font-weight:700; color:var(--text); margin-bottom:6px; }
.dp-address { font-size:12px; color:var(--text2); margin-bottom:10px; line-height:1.5; }
.dp-star-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.dp-stars { color:var(--yellow); font-size:16px; letter-spacing:1px; }
.dp-star-info { font-size:12px; color:var(--text3); }
.dp-nick { font-size:12px; color:var(--text3); margin-bottom:10px; }
.dp-kakao-btn { display:inline-flex; align-items:center; gap:6px; margin-bottom:10px; padding:7px 12px; background:rgba(255,193,0,.12); border:1px solid rgba(255,193,0,.25); border-radius:var(--radius-sm); color:#c8960a; font-size:12px; font-weight:500; text-decoration:none; transition:background .15s; font-family:var(--font-sans); }
.dp-kakao-btn:hover { background:rgba(255,193,0,.2); }
.dp-nick strong { color:var(--text2); }
.dp-review { background:var(--surface2); border-radius:var(--radius-sm); padding:10px 12px; font-size:13px; color:var(--text2); line-height:1.6; border-left:3px solid var(--accent); margin-bottom:10px; }

/* 태그 표시 (상세 패널) */
.dp-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.dp-tag  { font-size:11px; padding:3px 9px; border-radius:10px; border:1px solid var(--border2); color:var(--text3); background:var(--surface3); }
.dp-tag.discount { color:#fbbf24; border-color:rgba(251,191,36,.3); background:rgba(251,191,36,.08); }
.dp-tag.parking  { color:#60a5fa; border-color:rgba(96,165,250,.3); background:rgba(96,165,250,.08); }
.dp-tag.delivery { color:#a78bfa; border-color:rgba(167,139,250,.3); background:rgba(167,139,250,.08); }
.dp-tag.group    { color:#34d399; border-color:rgba(52,211,153,.3); background:rgba(52,211,153,.08); }
.dp-tag.solo     { color:#fb7185; border-color:rgba(251,113,133,.3); background:rgba(251,113,133,.08); }
.dp-tag.outdoor  { color:#6ee7b7; border-color:rgba(110,231,183,.3); background:rgba(110,231,183,.08); }
.dp-tag.quick    { color:#f97316; border-color:rgba(249,115,22,.3); background:rgba(249,115,22,.08); }

/* 별점 주기 */
.dp-rate-section { background:var(--surface2); border-radius:var(--radius-sm); padding:10px 12px; margin-bottom:10px; }
.dp-rate-label { font-size:11px; color:var(--text3); margin-bottom:6px; }
.dp-rate-stars { display:flex; gap:4px; }
.rate-star { font-size:22px; cursor:pointer; color:var(--surface3); transition:color .1s, transform .1s; line-height:1; }
.rate-star.lit { color:var(--yellow); }
.rate-star:hover { transform:scale(1.15); }

.dp-actions { display:flex; gap:8px; margin-bottom:10px; }
.dp-edit { flex:1; padding:8px; background:rgba(63,131,248,.1); border:1px solid rgba(63,131,248,.2); border-radius:var(--radius-sm); color:#4fa3f7; font-size:12px; cursor:pointer; font-family:var(--font-sans); transition:all .15s; }
.dp-edit:hover { background:rgba(63,131,248,.2); }
.dp-delete { flex:1; padding:8px; background:rgba(255,80,80,.1); border:1px solid rgba(255,80,80,.2); border-radius:var(--radius-sm); color:#ff6060; font-size:12px; cursor:pointer; font-family:var(--font-sans); transition:all .15s; }
.dp-delete:hover { background:rgba(255,80,80,.2); }
.dp-delete:disabled { opacity:.4; cursor:not-allowed; }

/* 댓글 */
.dp-comments { border-top:1px solid var(--border); padding-top:12px; }
.dp-comments-title { font-size:11px; font-weight:500; color:var(--text3); margin-bottom:8px; letter-spacing:.05em; }
.comment-item { padding:8px 0; border-bottom:1px solid var(--border); }
.comment-item:last-child { border-bottom:none; }
.comment-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
.comment-nick { font-size:11px; font-weight:500; color:var(--accent); }
.comment-date { font-size:10px; color:var(--text3); }
.comment-text { font-size:12px; color:var(--text2); line-height:1.5; }
.comment-delete { background:none; border:none; color:var(--text3); font-size:11px; cursor:pointer; padding:0 2px; }
.comment-delete:hover { color:#ff6060; }
.comment-input-wrap { display:flex; gap:6px; margin-top:10px; }
.comment-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:7px 10px; font-size:12px; color:var(--text); font-family:var(--font-sans); outline:none; transition:border-color .2s; }
.comment-input:focus { border-color:var(--accent); }
.comment-input::placeholder { color:var(--text3); }
.comment-send { padding:7px 12px; background:var(--accent); border:none; border-radius:var(--radius-sm); color:#fff; font-size:12px; cursor:pointer; font-family:var(--font-sans); transition:opacity .15s; white-space:nowrap; }
.comment-send:hover { opacity:.85; }
.no-comments { font-size:12px; color:var(--text3); text-align:center; padding:10px 0; }

/* ── MODAL ── */
#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:1000; align-items:center; justify-content:center; }
#modal-overlay.open { display:flex; }
#modal { background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius); padding:28px; width:420px; max-width:94vw; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.6); animation:modalIn .22s ease; scrollbar-width:none; }
#modal::-webkit-scrollbar { display:none; }
@keyframes modalIn { from{opacity:0;transform:scale(.95) translateY(10px)} to{opacity:1;transform:none} }
.modal-title { font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--text); margin-bottom:20px; }
.form-group { margin-bottom:16px; }
.form-label { font-size:12px; color:var(--text2); font-weight:500; margin-bottom:6px; display:block; }
.form-input, .form-select, .form-textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; font-size:13px; color:var(--text); font-family:var(--font-sans); outline:none; transition:border-color .2s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--accent); }
.form-input::placeholder, .form-textarea::placeholder { color:var(--text3); }
.form-select option { background:var(--surface); }
.form-textarea { height:80px; resize:none; line-height:1.6; }
.search-results { background:var(--surface2); border-radius:var(--radius-sm); border:1px solid var(--border2); overflow:hidden; display:none; box-shadow:0 8px 24px rgba(0,0,0,.4); }
.search-results.open { display:block; }
.search-result-item { padding:9px 12px; font-size:12px; color:var(--text2); cursor:pointer; border-bottom:1px solid var(--border); transition:background .1s; }
.search-result-item:last-child { border-bottom:none; }
.search-result-item:hover { background:var(--surface3); color:var(--text); }
.search-result-name { font-weight:500; color:var(--text); font-size:13px; }
.coord-preview { font-size:11px; color:var(--text3); margin-top:4px; display:none; }
.coord-preview.show { display:block; }
.star-picker { display:flex; gap:6px; margin-top:2px; }
.star-btn { font-size:24px; cursor:pointer; color:var(--surface3); transition:color .1s, transform .1s; line-height:1; }
.star-btn.lit { color:var(--yellow); }

/* 태그 선택 */
.tag-picker { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
.tag-pick-btn { padding:5px 11px; border-radius:20px; font-size:11px; border:1px solid var(--border2); background:var(--surface3); color:var(--text3); cursor:pointer; transition:all .15s; font-family:var(--font-sans); }
.tag-pick-btn:hover { color:var(--text2); }
.tag-pick-btn.on { color:#fff !important; }

/* ── 룰렛 모달 ── */

#roulette-modal {
  background:var(--surface); border:1px solid var(--border2); border-radius:20px;
  padding:32px 28px; width:480px; max-width:96vw;
  box-shadow:0 20px 60px rgba(0,0,0,.7); animation:modalIn .22s ease;
  display:flex; flex-direction:column; align-items:center; gap:20px;
}
.roulette-title { font-family:var(--font-display); font-size:22px; font-weight:700; color:var(--text); text-align:center; }
.roulette-cat-row { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
.roulette-cat-btn { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:500; border:1px solid var(--border2); background:var(--surface2); color:var(--text2); cursor:pointer; transition:all .15s; font-family:var(--font-sans); }

/* 원형 룰렛 캔버스 */
#roulette-canvas-wrap { position:relative; width:280px; height:280px; }
#roulette-canvas { border-radius:50%; display:block; }
.roulette-needle {
  position:absolute; top:-12px; left:50%; transform:translateX(-50%);
  width:0; height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;

  z-index:10;
}
.roulette-center-btn {

  display:flex; align-items:center; justify-content:center;
  font-size:20px; cursor:pointer; transition:all .15s;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.roulette-center-btn:hover { background:var(--surface2); border-color:var(--accent); }
.roulette-result {
  min-height:60px; display:flex; flex-direction:column; align-items:center;

}
.roulette-result-name { font-family:var(--font-display); font-size:20px; font-weight:700; color:var(--accent); }
.roulette-result-addr { font-size:12px; color:var(--text2); }
.roulette-result-stars { color:var(--yellow); font-size:14px; }
.roulette-go-btn {

  transition:opacity .15s; display:none;
}
.roulette-go-btn:hover { opacity:.85; }
.roulette-close { align-self:flex-end; background:none; border:none; color:var(--text3); font-size:20px; cursor:pointer; line-height:1; padding:0; }
.roulette-close:hover { color:var(--text); }

</style>

// [BUG FIX #1] 별점 명 수 계산 수정
// 등록자 별점 1표 포함해서 전체 count 계산
// ─────────────────────────────────────────────
function getAvgStars(placeId, baseStars) {
  const list = ratings[placeId] || [];
  // 등록자 별점 + 추가 평가자들
  const allScores = [baseStars, ...list.map(r => r.score)];
  const total = allScores.reduce((s, v) => s + v, 0);
  // count = 등록자(1) + 추가 평가자 수
  const count = list.length; // 추가 평가자 수만 표시 (등록자 제외, "X명 평가" 의미)
  return { avg: total / allScores.length, count: allScores.length }; // allScores.length = 총 평가자 수
}
function getMyRating(placeId) {
  return (ratings[placeId]||[]).find(r=>r.nick===myNick)?.score || 0;
}
function getMyRatingId(placeId) {
  return (ratings[placeId]||[]).find(r=>r.nick===myNick)?.id || null;
}
async function cancelRating(placeId) {
  const rId = getMyRatingId(placeId);
  if(rId) { try { await api.delRating(rId); } catch {} }
  if(ratings[placeId]) ratings[placeId] = ratings[placeId].filter(r=>r.nick!==myNick);
  const p = places.find(x=>x.id===placeId);
  if(p) showDetail(p);
  renderList();
  showToast('별점이 취소됐어요.');
}
function getCommentCount(placeId) { return (comments[placeId]||[]).length; }

// ── 닉네임 (24시간 잠금) ──
const NICK_CHANGE_KEY = 'foodmap_nick_changed_at';
function getNickCooldownRemain() {
  const ts = parseInt(localStorage.getItem(NICK_CHANGE_KEY)||'0', 10);
  if(!ts) return 0;
  const remain = 24*60*60*1000 - (Date.now()-ts);
  return remain > 0 ? remain : 0;
}
function formatRemain(ms) {
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  return h>0 ? `${h}시간 ${m}분` : `${m}분`;
}
function submitNick() {
  const v = document.getElementById('nick-input').value.trim();
  const e = document.getElementById('nick-error');
  if(!v)         { e.textContent='닉네임을 입력해주세요.'; return; }
  if(v.length<2) { e.textContent='2자 이상 입력해주세요.'; return; }
  myNick = v.slice(0,12);
  localStorage.setItem('foodmap_nick', myNick);
  // 첫 설정은 변경 타임스탬프 없음 (처음 설정은 제한 없음)
  document.getElementById('nick-screen').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  document.getElementById('my-nick-display').textContent=myNick;
  initMap();
}
function changeNick() {
  const remain = getNickCooldownRemain();
  if(remain > 0) {
    showToast(`⏳ 닉네임은 ${formatRemain(remain)} 후에 변경 가능해요`);
    return;
  }
  const n = prompt(`새 닉네임 (2~12자):\n⚠️ 변경 후 24시간 동안 재변경 불가`, myNick);
  if(n && n.trim().length>=2) {
    myNick = n.trim().slice(0,12);
    localStorage.setItem('foodmap_nick', myNick);
    localStorage.setItem(NICK_CHANGE_KEY, Date.now().toString());
    document.getElementById('my-nick-display').textContent=myNick;
    showToast('닉네임 변경됐어요! 🎉 (24시간 잠금)');
  } else if(n !== null && n.trim().length < 2) {
    showToast('⚠️ 2자 이상 입력해야 해요');
  }
}

// ── 데이터 로드 ──
async function loadData() {
  setSyncState('loading');
  try {
    let data = await api.get();
    if(!Array.isArray(data)||data.length===0) {
      showToast('📦 기본 추천 맛집 등록 중...');
      const today = new Date().toLocaleDateString('ko-KR');
      for(const s of SEEDS) await api.post({...s, createdAt:today, tags:(s.tags||[]).join(',')});
      data = await api.get();
    }
    places = Array.isArray(data) ? data.map(normalize) : [];
    setSyncState('ok');
    await loadAllComments();
    renderAll();
    clearInterval(pollTimer);
    pollTimer = setInterval(async()=>{
      try {
        const d = await api.get();
        if(Array.isArray(d)){
          places = d.map(normalize);
          await loadAllComments();
          renderAll();
          setSyncState('ok');
        }
      } catch { setSyncState('error'); }
    }, 30000);
  } catch(e) {
    setSyncState('error');
    places = SEEDS.map((s,i)=>({...s,id:'local_'+i}));
    renderAll();
    showToast('⚠️ 오프라인 모드');
  }
}
async function loadAllComments() {
  try {
    const [allC, allR] = await Promise.all([api.getAllComments(), api.getAllRatings()]);
    comments = {}; ratings = {};
    if(Array.isArray(allC)) allC.forEach(c=>{ if(!comments[c.placeId]) comments[c.placeId]=[]; comments[c.placeId].push(c); });
    if(Array.isArray(allR)) allR.forEach(r=>{ if(!ratings[r.placeId])  ratings[r.placeId]=[]; ratings[r.placeId].push(r); });
  } catch(e) { console.warn('댓글/별점 로드 실패:',e.message); }
}

function normalize(p) {
  let tags = [];
  if(Array.isArray(p.tags)) tags = p.tags;
  else if(typeof p.tags === 'string' && p.tags) tags = p.tags.split(',').map(t=>t.trim()).filter(Boolean);
  else if(p.review) {
    // tags 필드가 없는 구버전 데이터 — tags 빈 배열로
    tags = [];
  }
  return {
    id:p.id||'', name:p.name||'', addr:p.addr||'', addrDetail:p.addrDetail||'',
    cat:p.cat||'기타', stars:p.stars||3, review:p.review||'', nick:p.nick||'익명',
    lat:p.lat||0, lng:p.lng||0, createdAt:p.createdAt||'',
    isSeeded:p.isSeeded||false, mapUrl:p.mapUrl||'', tags,
  };
}

// ── 필터/정렬 ──
function setFilter(cat,btn) {
  curFilter=cat;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function setSort(sort,btn) {
  curSort=sort;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let list = places.filter(p=>{
    const matchCat = curFilter==='전체'||p.cat===curFilter;
    const matchQ   = !q||p.name.toLowerCase().includes(q)||p.nick.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  if(curSort==='stars') list.sort((a,b)=>getAvgStars(b.id,b.stars).avg-getAvgStars(a.id,a.stars).avg);
  else if(curSort==='comments') list.sort((a,b)=>getCommentCount(b.id)-getCommentCount(a.id));
  return list;
}

// ── 렌더 ──
function renderList() {
  const list     = document.getElementById('place-list');
  const filtered = getFiltered();
  document.getElementById('total-count').textContent=places.length;
  const filteredIds = new Set(filtered.map(p=>p.id));
  Object.entries(markers).forEach(([id,m])=>{
    if(m._icon) m._icon.style.opacity=filteredIds.size===0||filteredIds.has(id)?'1':'0.2';
  });
  if(!filtered.length){list.innerHTML='<div id="no-result">😅 해당하는 맛집이 없어요</div>';return;}
  list.innerHTML=filtered.map(p=>{
    // [BUG FIX #1] count = 등록자 포함 전체 평가자 수
    const {avg, count} = getAvgStars(p.id, p.stars);
    const starStr = '★'.repeat(Math.round(avg)).padEnd(5,'☆').slice(0,5);
    const cCount  = getCommentCount(p.id);
    const tagHtml = p.tags&&p.tags.length
      ? `<div class="item-tags">${p.tags.map(t=>`<span class="item-tag ${TAG_CLASS[t]||''}">${TAG_EMOJI[t]||''}${t}</span>`).join('')}</div>`
      : '';
    return `
    <div class="place-item${selId===p.id?' active':''}" onclick="selectPlace('${p.id}')">
      <div class="place-item-top">
        <span class="place-item-name">${p.name}</span>
        <span class="cat-badge cat-${p.cat}">${p.cat}</span>
      </div>
      <div class="place-item-meta">
        <span class="stars-mini">${starStr}</span>
        <span class="star-count">${avg.toFixed(1)}${count>1?` (${count}명)`:''}</span>
        <span class="nick-tag">@${p.nick}${p.isSeeded?' 🤖':''}</span>
        ${cCount?`<span class="comment-count">💬 ${cCount}</span>`:''}
      </div>
      ${p.review?`<div class="place-item-review">${p.review}</div>`:''}
      ${tagHtml}
    </div>`;
  }).join('');
}

function renderMarkers() {
  if(!map) return;
  Object.values(markers).forEach(m=>m.remove());
  markers={};
  places.forEach(p=>{
    if(!p.lat||!p.lng) return;
    const color = CAT_COLORS[p.cat]||'#888';
    const isSel = selId===p.id;
    const icon = L.divIcon({
      className:'',
      html:`<div class="map-pin-wrap"><div class="map-pin-bubble${isSel?' sel':''}" style="border-color:${isSel?color:'rgba(255,255,255,0.15)'}"><span class="pin-dot" style="background:${color}"></span>${p.name}</div><div class="pin-tail${isSel?' sel':''}"></div></div>`,
      iconAnchor:[0,34],
    });
    const m = L.marker([p.lat,p.lng],{icon}).addTo(map);
    m.on('click',()=>selectPlace(p.id));
    markers[p.id]=m;
  });
}
function renderAll(){renderList();renderMarkers();}

// ── 선택 ──
function selectPlace(id) {
  selId = selId===id?null:id;
  renderAll();
  if(selId){
    const p=places.find(x=>x.id===id);

    ${!isMine?`<div class="dp-rate-section">
      <div class="dp-rate-label">${myRate?'내 별점 (수정 가능)':'이 식당에 별점을 주세요'}</div>

      </div>

      </div>

// ── 별점 주기 ──
let pendingRating = {};
function previewRating(placeId, score) {
  pendingRating[placeId] = score;
  const starsEl = document.getElementById('rate-stars-'+placeId);
  if(!starsEl) return;
  starsEl.innerHTML = [1,2,3,4,5].map(n=>
    `<span class="rate-star${score>=n?' lit':''}" onclick="previewRating('${placeId}',${n})">${n<=score?'★':'☆'}</span>`
  ).join('');
  const actionEl = document.getElementById('rate-action-'+placeId);
  if(actionEl) actionEl.innerHTML = `
    <span style="font-size:11px;color:var(--text2)">${score}점 — </span>
    <button onclick="confirmRating('${placeId}')" style="font-size:11px;color:#5cb85c;background:none;border:none;cursor:pointer;padding:0 4px">✓ 저장</button>
    <button onclick="discardRating('${placeId}')" style="font-size:11px;color:#ff6060;background:none;border:none;cursor:pointer;padding:0 4px">✕ 취소</button>
    ${getMyRating(placeId)?`<button onclick="cancelRating('${placeId}')" style="font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0 4px">기존 평가 삭제</button>`:''}
  `;
}
async function confirmRating(placeId) {
  const score = pendingRating[placeId];
  if(!score) return;
  delete pendingRating[placeId];
  try {
    const saved = await api.postRating({ placeId, nick:myNick, score });
    if(!ratings[placeId]) ratings[placeId]=[];
    ratings[placeId] = ratings[placeId].filter(r=>r.nick!==myNick);
    ratings[placeId].push(saved.id ? saved : {id:Date.now().toString(), placeId, nick:myNick, score});
  } catch(e) { showToast('저장 실패: '+e.message); return; }
  const p = places.find(x=>x.id===placeId);
  if(p) showDetail(p);
  renderList();
  showToast(`⭐ ${score}점 저장됐어요!`);
}
function discardRating(placeId) {
  delete pendingRating[placeId];
  const p = places.find(x=>x.id===placeId);
  if(p) showDetail(p);
}

function closeDetail() {
  selId=null;
  document.getElementById('detail-panel').classList.remove('show');
  renderAll();
}
async function deletePlace(id) {
  if(!confirm('정말 삭제하시겠어요?')) return;
  const btn=document.getElementById('del-btn');
  if(btn){btn.disabled=true;btn.textContent='삭제 중...';}
  try {
    await api.del(id);
    const d=await api.get();
    places=Array.isArray(d)?d.map(normalize):places.filter(p=>p.id!==id);
    closeDetail();renderAll();
    showToast('삭제됐습니다.');
  } catch(e){showToast('삭제 실패: '+e.message);}
}

// ── 댓글 ──
function renderComments(placeId) {
  const list = comments[placeId]||[];
  if(!list.length) return '<div class="no-comments">아직 댓글이 없어요. 첫 댓글을 남겨보세요!</div>';
  return list.map(c=>`
    <div class="comment-item">
      <div class="comment-header">
        <span class="comment-nick">@${c.nick}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span class="comment-date">${c.date}</span>
          ${c.nick===myNick?`<button class="comment-delete" onclick="removeComment('${placeId}','${c.id}')">✕</button>`:''}
        </span>
      </div>
      <div class="comment-text">${c.text}</div>
    </div>`).join('');
}
async function addComment(placeId) {
  const input = document.getElementById('comment-input-'+placeId);
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  if(input.dataset.submitting==='1') return;
  input.dataset.submitting='1';
  input.value='';
  const body = {placeId, nick:myNick, text, date:new Date().toLocaleDateString('ko-KR')};
  try {
    const saved = await api.postComment(body);
    if(!comments[placeId]) comments[placeId]=[];
    comments[placeId].push(saved.id ? saved : {...body, id:Date.now().toString()});
  } catch {
    if(!comments[placeId]) comments[placeId]=[];
    comments[placeId].push({...body, id:Date.now().toString()});
  }
  input.dataset.submitting='';
  const listEl = document.getElementById('comment-list-'+placeId);
  if(listEl) listEl.innerHTML=renderComments(placeId);
  renderList();
}
async function removeComment(placeId, commentId) {
  try { await api.delComment(commentId); } catch {}
  if(comments[placeId]) comments[placeId]=comments[placeId].filter(c=>c.id!==commentId);
  const listEl = document.getElementById('comment-list-'+placeId);
  if(listEl) listEl.innerHTML=renderComments(placeId);
  renderList();
}

// ── 등록/수정 모달 ──
function toggleTag(btn) {
  btn.classList.toggle('on');
  const tag = btn.dataset.tag;
  if(btn.classList.contains('on')) {
    if(!selectedTags.includes(tag)) selectedTags.push(tag);
  } else {
    selectedTags = selectedTags.filter(t=>t!==tag);
  }
}
function openModal() {
  editingId=null; selectedTags=[];
  ['f-name','f-addr','f-addr-detail','f-review','f-mapurl'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-addr').setAttribute('readonly','');
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('f-cat').value='';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('submit-btn').textContent='등록하기';
  document.getElementById('modal-title').textContent='🍽️ 맛집 등록';
  document.getElementById('coord-preview').classList.remove('show');
  document.querySelectorAll('.tag-pick-btn').forEach(b=>b.classList.remove('on'));
  curStar=0; pendingCoord=null; updateStars();
  document.getElementById('modal-overlay').classList.add('open');
}
function openEditModal(id) {
  const p = places.find(x=>x.id===id);
  if(!p) return;
  editingId=id; selectedTags=[...(p.tags||[])];
  document.getElementById('f-addr').removeAttribute('readonly');
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-addr').value=p.addr;
  document.getElementById('f-addr-detail').value=p.addrDetail||'';
  document.getElementById('f-cat').value=p.cat;
  document.getElementById('f-review').value=p.review||'';
  document.getElementById('f-mapurl').value=p.mapUrl||'';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('submit-btn').textContent='수정 완료';
  document.getElementById('modal-title').textContent='✏️ 맛집 수정';
  document.getElementById('search-results').classList.remove('open');
  // 태그 버튼 복원
  document.querySelectorAll('.tag-pick-btn').forEach(b=>{
    b.classList.toggle('on', selectedTags.includes(b.dataset.tag));
  });
  pendingCoord=p.lat?{lat:p.lat,lng:p.lng}:null;
  if(pendingCoord){
    const prev=document.getElementById('coord-preview');
    prev.textContent='📍 현재 위치 저장됨';

  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.getElementById('f-addr').setAttribute('readonly','');}
function setStar(n){curStar=n;updateStars();}
function updateStars(){ document.querySelectorAll('.star-btn').forEach((s,i)=>s.classList.toggle('lit',i<curStar)); }

let searchTimer=null;
function onNameInput() {
  const q = document.getElementById('f-name').value.trim();
  const resultsEl = document.getElementById('search-results');
  clearTimeout(searchTimer);
  if(!q||q.length<2){resultsEl.classList.remove('open');return;}
  resultsEl.innerHTML='<div class="search-result-item" style="color:var(--text3);font-size:12px">검색 중...</div>';
  resultsEl.classList.add('open');
  searchTimer = setTimeout(()=>liveSearch(q), 350);
}
async function liveSearch(q) {
  const resultsEl = document.getElementById('search-results');
  try {
    const results = await api.search(q);
    if(!results||!results.length){resultsEl.innerHTML='<div class="search-result-item" style="color:var(--text3);font-size:12px">검색 결과가 없어요</div>';return;}
    resultsEl.innerHTML=results.map((r,i)=>`
      <div class="search-result-item" onclick="pickPlace(${i})">
        <div class="search-result-name">${r.name}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${r.addr}</div>
      </div>`).join('');
    resultsEl._data=results;
  } catch {
    resultsEl.innerHTML=`<div class="search-result-item" style="color:#ff6060;font-size:12px">검색 실패</div>`;
  }
}
function pickPlace(i) {
  const r = document.getElementById('search-results')._data[i];
  document.getElementById('f-name').value=r.name;
  document.getElementById('f-addr').value=r.addr;
  document.getElementById('f-mapurl').value=r.mapUrl||'';
  pendingCoord={lat:r.lat,lng:r.lng};
  document.getElementById('search-results').classList.remove('open');
  const prev=document.getElementById('coord-preview');
  prev.textContent=`📍 ${r.name} · ${r.addr}`;
  prev.classList.add('show');
  if(map) map.panTo([r.lat,r.lng]);
}
document.addEventListener('click',(e)=>{
  if(!e.target.closest('#f-name')&&!e.target.closest('#search-results'))
    document.getElementById('search-results')?.classList.remove('open');
});
async function submitPlace() {
  const name=document.getElementById('f-name').value.trim();
  const addr=document.getElementById('f-addr').value.trim();
  const cat =document.getElementById('f-cat').value;
  if(!name){showToast('⚠️ 음식점 이름을 입력해주세요');return;}
  if(!cat) {showToast('⚠️ 카테고리를 선택해주세요');return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true; btn.textContent=editingId?'수정 중...':'등록 중...';
  const body={
    name,addr,
    addrDetail:document.getElementById('f-addr-detail').value.trim(),
    cat,stars:curStar||3,
    review:document.getElementById('f-review').value.trim(),
    nick:myNick,
    lat:pendingCoord?.lat||0, lng:pendingCoord?.lng||0,
    mapUrl:document.getElementById('f-mapurl').value.trim(),
    isSeeded:false,
    tags:selectedTags.join(','),
  };
  try {
    if(editingId){await api.patch(editingId,body);showToast('✅ 수정됐어요!');}
    else{await api.post(body);showToast('✅ 저장됐어요!');}
    const d=await api.get();
    places=Array.isArray(d)?d.map(normalize):places;
    closeModal();renderAll();
  } catch(e){
    showToast((editingId?'수정':'등록')+' 실패: '+e.message);
    btn.disabled=false; btn.textContent=editingId?'수정 완료':'등록하기';
  }
}

// ── 룰렛 ──────────────────────────────────────────────────
const ROULETTE_PALETTE = [
  '#e85d3c','#e87c3c','#c0392b','#e8a03c','#3c8ee8',
  '#2ecc71','#7c5ce8','#e84393','#27ae60','#5cb85c','#888888'
];

function openRoulette() {
  buildRouletteCats();
  rouletteSelectedCat = '전체';
  rouletteResult = null;
  document.getElementById('roulette-result').innerHTML='';
  document.getElementById('roulette-go-btn').style.display='none';
  drawRoulette(getRouletteItems(), 0);
  document.getElementById('roulette-modal-overlay').classList.add('open');
}
function closeRoulette(){document.getElementById('roulette-modal-overlay').classList.remove('open');}

function buildRouletteCats() {
  const cats = ['전체', ...ALL_CATS.filter(c=>places.some(p=>p.cat===c))];
  document.getElementById('roulette-cats').innerHTML = cats.map(c=>
    `<button class="roulette-cat-btn${c==='전체'?' active':''}" data-cat="${c}" onclick="setRouletteCat(this,'${c}')">${c}</button>`
  ).join('');
}
function setRouletteCat(btn, cat) {
  rouletteSelectedCat=cat;
  document.querySelectorAll('.roulette-cat-btn').forEach(b=>b.classList.toggle('active',b===btn));
  rouletteResult=null;
  document.getElementById('roulette-result').innerHTML='';
  document.getElementById('roulette-go-btn').style.display='none';
  drawRoulette(getRouletteItems(), 0);
}
function getRouletteItems() {
  const list = rouletteSelectedCat==='전체'
    ? places
    : places.filter(p=>p.cat===rouletteSelectedCat);
  return list.length ? list : places;
}

function drawRoulette(items, rotationDeg) {
  const canvas = document.getElementById('roulette-canvas');
  const ctx    = canvas.getContext('2d');
  const W=280, H=280, cx=W/2, cy=H/2, r=cx-4;
  ctx.clearRect(0,0,W,H);
  if(!items.length) return;
  const slice = (2*Math.PI)/items.length;

  items.forEach((p,i)=>{
    const startAngle = slice*i + (rotationDeg*Math.PI/180);
    const endAngle   = startAngle + slice;
    const color = ROULETTE_PALETTE[i % ROULETTE_PALETTE.length];

    // 부채꼴
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,startAngle,endAngle);
    ctx.closePath();
    ctx.fillStyle=color;
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.15)';
    ctx.lineWidth=1.5;
    ctx.stroke();

    // 텍스트
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(startAngle+slice/2);
    ctx.textAlign='right';
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.font=`bold ${items.length>8?10:12}px 'Noto Sans KR',sans-serif`;
    const maxLen = 7;
    const label = p.name.length>maxLen ? p.name.slice(0,maxLen)+'…' : p.name;
    ctx.fillText(label, r-10, 4);
    ctx.restore();
  });

  // 중앙 원
  ctx.beginPath();
  ctx.arc(cx,cy,28,0,2*Math.PI);
  ctx.fillStyle='#1a1a22';
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';
  ctx.lineWidth=2;
  ctx.stroke();
}

function spinRoulette() {
  if(isSpinning) return;
  const items = getRouletteItems();
  if(!items.length){showToast('등록된 맛집이 없어요!');return;}

  isSpinning=true;
  rouletteResult=null;
  document.getElementById('roulette-result').innerHTML='<div style="font-size:13px;color:var(--text3)">돌리는 중... 🌀</div>';
  document.getElementById('roulette-go-btn').style.display='none';

  const totalDeg   = 1440 + Math.random()*360; // 4바퀴 + 랜덤
  const duration   = 3500;
  const startTime  = performance.now();
  let   startAngle = 0;

  // 결과 인덱스 계산 (바늘은 12시 = 270도)
  const finalAngle   = totalDeg % 360;
  const slice        = 360 / items.length;
  // 바늘(위)에 해당하는 섹터 = (360 - finalAngle) % 360
  const needleAngle  = (360 - finalAngle) % 360;
  const resultIdx    = Math.floor(needleAngle / slice) % items.length;

  function easeOut(t) { return 1 - Math.pow(1-t, 4); }

  function frame(now) {
    const elapsed = now - startTime;
    const t       = Math.min(elapsed/duration, 1);
    const current = easeOut(t) * totalDeg;
    drawRoulette(items, current);
    if(t < 1) {
      requestAnimationFrame(frame);
    } else {
      isSpinning=false;
      drawRoulette(items, totalDeg);
      rouletteResult = items[resultIdx];
      showRouletteResult(rouletteResult);
    }
  }
  requestAnimationFrame(frame);
}

function showRouletteResult(p) {
  const {avg} = getAvgStars(p.id, p.stars);
  const starStr = '★'.repeat(Math.round(avg)).padEnd(5,'☆').slice(0,5);
  document.getElementById('roulette-result').innerHTML=`
    <div style="font-size:12px;color:var(--text3)">오늘의 선택</div>
    <div class="roulette-result-name">🎉 ${p.name}</div>
    <div class="roulette-result-stars">${starStr} ${avg.toFixed(1)}</div>
    <div class="roulette-result-addr">${p.addr}</div>
  `;
  document.getElementById('roulette-go-btn').style.display='block';
}
function goToResult() {
  if(!rouletteResult) return;
  closeRoulette();
  selectPlace(rouletteResult.id);
}

// ── 피드백 ─────────────────────────────────────────────────
function openFeedback() { document.getElementById('feedback-modal-overlay').classList.add('open'); }
function closeFeedback(){ document.getElementById('feedback-modal-overlay').classList.remove('open'); }
function setFeedbackType(btn) {
  feedbackType = btn.dataset.type;
  document.querySelectorAll('.feedback-type-btn').forEach(b=>b.classList.toggle('active',b===btn));
}
async function submitFeedback() {
  const text = document.getElementById('feedback-text').value.trim();
  if(!text){ showToast('⚠️ 내용을 입력해주세요'); return; }
  const btn = document.getElementById('feedback-submit-btn');
  btn.disabled=true; btn.textContent='보내는 중...';

  const payload = {
    text: `*[맛집 지도 피드백] ${feedbackType}*\n\n*작성자:* @${myNick}\n*유형:* ${feedbackType}\n*내용:*\n${text}\n\n_${new Date().toLocaleString('ko-KR')}_`
  };

  try {
    // 서버 측 슬랙 웹훅 엔드포인트 사용 (api/index.js 에 /slack 경로 추가 필요)
    // 또는 SLACK_WEBHOOK_URL이 직접 설정된 경우
    let sent = false;
    if(SLACK_WEBHOOK_URL) {
      await fetch(SLACK_WEBHOOK_URL, {
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
      sent = true;
    } else {
      // 서버 측 프록시로 전달
      const r = await fetch(`${API}?path=slack`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({type:feedbackType, nick:myNick, text})
      });
      sent = r.ok;
    }
    document.getElementById('feedback-text').value='';
    closeFeedback();
    showToast('피드백 전달됐어요! 감사합니다 🙏');
  } catch(e) {
    // no-cors 사용 시 항상 성공으로 처리
    document.getElementById('feedback-text').value='';
    closeFeedback();
    showToast('피드백 전달됐어요! 감사합니다 🙏');
  } finally {
    btn.disabled=false; btn.textContent='보내기 🚀';
  }
}
